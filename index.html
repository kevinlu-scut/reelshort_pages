<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Short Drama Tag Bubble Chart</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
<div id="rmBubbleChart" class="rm-bubble-chart">
  <div class="rm-header">
    <div>
      <h2>&#26631;&#31614;&#30340;&#25773;&#25918;&#37327;&#19982;&#25910;&#34255;&#37327;&#20851;&#31995;</h2>
      <p>&#27668;&#27873;&#22823;&#23567;&#21644;&#39068;&#33394;&#34920;&#31034;&#35813;&#26631;&#31614;&#19979;&#30340;&#21095;&#30446;&#25968;&#37327;&#65307;&#27178;&#32437;&#36724;&#22343;&#20026;&#23545;&#25968;&#23610;&#24230;&#12290;</p>
    </div>
    <div class="rm-controls">
      <input class="rm-search" type="search" placeholder="Search tag..." />
      <label><input class="rm-label-toggle" type="checkbox" checked /> &#26174;&#31034;&#26631;&#31614;</label>
      <select class="rm-mode">
        <option value="all">&#20840;&#37096;</option>
        <option value="popular">&#39640;&#25773;&#25918;</option>
        <option value="saved">&#39640;&#25910;&#34255;</option>
        <option value="large">&#39640;&#21095;&#30446;&#25968;</option>
        <option value="niche">&#23567;&#20247;&#39640;&#25928;</option>
      </select>
    </div>
  </div>
  <div class="rm-chart-box">
    <svg class="rm-chart" viewBox="0 0 1060 620" role="img"></svg>
    <div class="rm-tooltip"></div>
    <div class="rm-active-card">&#28857;&#20987;&#25110;&#24748;&#20572;&#27668;&#27873;&#26597;&#30475;&#35814;&#24773;</div>
  </div>
  <div class="rm-legend">
    <span class="rm-legend-title">&#21095;&#30446;&#25968;&#37327;</span>
    <span class="rm-strip"></span>
    <span>&#23569;</span>
    <span>&#22810;</span>
    <span class="rm-size-dot small"></span>
    <span>100</span>
    <span class="rm-size-dot mid"></span>
    <span>300</span>
    <span class="rm-size-dot big"></span>
    <span>600</span>
  </div>
</div>

<style>
  #rmBubbleChart,
  #rmBubbleChart * {
    box-sizing: border-box;
  }

  #rmBubbleChart {
    --rm-bg: #dfe5ff;
    --rm-ink: #272a42;
    --rm-muted: #626985;
    --rm-grid: rgba(91, 101, 138, 0.24);
    --rm-grid-strong: rgba(91, 101, 138, 0.42);
    width: 100%;
    height: 620px;
    min-height: 520px;
    overflow: hidden;
    border: 1px solid rgba(73, 80, 119, 0.22);
    background: rgba(238, 242, 255, 0.78);
    color: var(--rm-ink);
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  }

  #rmBubbleChart .rm-header {
    height: 88px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    padding: 12px 14px 0;
  }

  #rmBubbleChart h2 {
    margin: 0;
    font-size: 22px;
    line-height: 1.16;
    font-weight: 800;
    letter-spacing: 0;
  }

  #rmBubbleChart p {
    margin: 6px 0 0;
    color: var(--rm-muted);
    font-size: 12px;
    line-height: 1.35;
  }

  #rmBubbleChart .rm-controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 460px;
    font-size: 12px;
    color: var(--rm-muted);
  }

  #rmBubbleChart input,
  #rmBubbleChart select {
    min-height: 30px;
    border: 1px solid rgba(86, 94, 140, 0.24);
    background: rgba(255, 255, 255, 0.58);
    color: var(--rm-ink);
    font: inherit;
    outline: 0;
  }

  #rmBubbleChart .rm-search {
    width: 168px;
    padding: 0 9px;
  }

  #rmBubbleChart select {
    padding: 0 8px;
  }

  #rmBubbleChart input[type="checkbox"] {
    min-height: auto;
    accent-color: #6d47c9;
    vertical-align: -2px;
  }

  #rmBubbleChart .rm-chart-box {
    position: relative;
    height: calc(100% - 136px);
    padding: 0 10px;
  }

  #rmBubbleChart .rm-chart {
    display: block;
    width: 100%;
    height: 100%;
    pointer-events: auto;
    user-select: none;
    touch-action: manipulation;
  }

  #rmBubbleChart .rm-plot-bg {
    fill: rgba(255, 255, 255, 0.42);
    stroke: rgba(74, 80, 120, 0.46);
    stroke-width: 1.2;
  }

  #rmBubbleChart .rm-grid {
    stroke: var(--rm-grid);
    stroke-width: 1;
    vector-effect: non-scaling-stroke;
  }

  #rmBubbleChart .rm-grid.major {
    stroke: var(--rm-grid-strong);
    stroke-width: 1.15;
  }

  #rmBubbleChart .rm-axis-title {
    fill: #30354e;
    font-size: 13px;
    font-weight: 800;
  }

  #rmBubbleChart .rm-tick {
    fill: #5b617d;
    font-size: 11px;
  }

  #rmBubbleChart .rm-bubble {
    cursor: pointer;
    stroke: rgba(255, 255, 255, 0.78);
    stroke-width: 1.1;
    opacity: 0.84;
    transition: opacity 0.15s ease, stroke-width 0.15s ease;
  }

  #rmBubbleChart .rm-bubble.is-muted {
    opacity: 0.12;
  }

  #rmBubbleChart .rm-bubble.is-active {
    opacity: 1;
    stroke-width: 2.3;
    filter: drop-shadow(0 6px 10px rgba(54, 43, 113, 0.28));
  }

  #rmBubbleChart .rm-label {
    fill: #5d39b0;
    paint-order: stroke;
    stroke: rgba(236, 240, 255, 0.92);
    stroke-width: 3.8;
    stroke-linejoin: round;
    font-size: 10.5px;
    font-weight: 700;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }

  #rmBubbleChart .rm-label.is-muted {
    opacity: 0.12;
  }

  #rmBubbleChart .rm-label.is-hidden {
    opacity: 0;
  }

  #rmBubbleChart .rm-focus {
    stroke: rgba(46, 61, 126, 0.42);
    stroke-width: 1;
    stroke-dasharray: 4 4;
    opacity: 0;
    pointer-events: none;
  }

  #rmBubbleChart .rm-focus.is-visible {
    opacity: 1;
  }

  #rmBubbleChart .rm-tooltip {
    position: absolute;
    z-index: 20;
    min-width: 218px;
    padding: 11px 12px;
    border: 1px solid rgba(67, 71, 110, 0.2);
    background: rgba(255, 255, 255, 0.96);
    color: var(--rm-ink);
    box-shadow: 0 14px 30px rgba(50, 54, 96, 0.2);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, calc(-100% - 14px));
    transition: opacity 0.12s ease;
    font-size: 12px;
  }

  #rmBubbleChart .rm-tooltip.is-visible {
    opacity: 1;
  }

  #rmBubbleChart .rm-tooltip h3 {
    margin: 0 0 7px;
    color: #352c95;
    font-size: 15px;
  }

  #rmBubbleChart .rm-active-card {
    position: absolute;
    left: 20px;
    bottom: 14px;
    z-index: 18;
    max-width: min(360px, calc(100% - 40px));
    padding: 9px 11px;
    border: 1px solid rgba(67, 71, 110, 0.18);
    background: rgba(255, 255, 255, 0.76);
    color: #404762;
    font-size: 12px;
    line-height: 1.35;
    box-shadow: 0 10px 24px rgba(50, 54, 96, 0.12);
  }

  #rmBubbleChart .rm-row {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    margin-top: 4px;
    color: #555b75;
  }

  #rmBubbleChart .rm-row strong {
    color: #252941;
    white-space: nowrap;
  }

  #rmBubbleChart .rm-legend {
    height: 48px;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 0 16px 10px 84px;
    color: #4c526d;
    font-size: 12px;
  }

  #rmBubbleChart .rm-legend-title {
    font-weight: 800;
  }

  #rmBubbleChart .rm-strip {
    width: 138px;
    height: 16px;
    background: linear-gradient(90deg, #4541bd, #7d43c7, #cc5d9b, #f3a95c, #d9de39);
    border: 1px solid rgba(65, 70, 112, 0.22);
  }

  #rmBubbleChart .rm-size-dot {
    display: inline-block;
    border-radius: 50%;
    background: rgba(46, 46, 60, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.62);
  }

  #rmBubbleChart .rm-size-dot.small {
    width: 16px;
    height: 16px;
  }

  #rmBubbleChart .rm-size-dot.mid {
    width: 24px;
    height: 24px;
  }

  #rmBubbleChart .rm-size-dot.big {
    width: 34px;
    height: 34px;
  }

  @media (max-width: 760px) {
    #rmBubbleChart {
      height: 560px;
    }

    #rmBubbleChart .rm-header {
      height: 126px;
      display: block;
    }

    #rmBubbleChart .rm-controls {
      justify-content: flex-start;
      margin-top: 9px;
    }

    #rmBubbleChart .rm-chart-box {
      height: calc(100% - 172px);
    }

    #rmBubbleChart .rm-legend {
      padding-left: 14px;
      gap: 6px;
      overflow: hidden;
    }
  }
</style>

<script>
(function () {
  function ready(fn) {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fn);
    } else {
      window.setTimeout(fn, 0);
    }
  }

  ready(function () {
    var root = document.getElementById("rmBubbleChart");
    if (!root || root.getAttribute("data-ready") === "1") return;
    root.setAttribute("data-ready", "1");

    var rawData = [
      ["Hidden Identity", 614, 11158359.28, 112770.8469],
      ["Revenge", 468, 6502161.752, 90957.05128],
      ["Secret", 334, 9431311.677, 115081.4371],
      ["Reunion", 282, 5951287.234, 52871.63121],
      ["Love Triangle", 266, 9073654.887, 95772.55639],
      ["Self-Growth", 218, 2683988.532, 37990.82569],
      ["Mistaken Identity", 215, 9587260.465, 94783.72093],
      ["Hidden Feelings", 214, 6777035.981, 65679.90654],
      ["Genius Babies", 194, 1696592.784, 20036.59794],
      ["Karma", 194, 1695249.485, 20032.98969],
      ["Love After Marriage", 192, 11192440.63, 81738.54167],
      ["All-Too-Late", 176, 4505779.545, 53061.36364],
      ["Flash Marriage", 174, 10034929.31, 77971.26437],
      ["Redemption", 166, 6945540.361, 82724.6988],
      ["Contract Lovers", 164, 12381523.78, 108821.9512],
      ["Pregnancy", 158, 13616596.2, 122584.1772],
      ["Lost Child", 130, 6184186.923, 70995.38462],
      ["Affair", 126, 5872028.571, 70506.34921],
      ["Business", 124, 10226195.97, 90911.29032],
      ["Rebirth", 116, 1308306.034, 14278.44828],
      ["Love-Hate", 104, 3119350, 40395.19231],
      ["Campus Lovers", 98, 35564267.35, 382689.7959],
      ["First Love", 96, 10771815.63, 113857.2917],
      ["Office Romance", 94, 7998102.128, 68820.21277],
      ["Enemies To Lovers", 84, 17481672.62, 195221.4286],
      ["Friends To Lovers", 74, 3393840.541, 38321.62162],
      ["Super Power", 72, 3983187.5, 34381.94444],
      ["Time Travel", 72, 827990.2778, 13222.22222],
      ["Love After Divorce", 66, 15824748.48, 147307.5758],
      ["Morals & Ethics", 58, 1112101.724, 18274.13793],
      ["Age Gap", 57, 31143926.32, 317538.5965],
      ["Reincarnation", 56, 1131648.214, 14769.64286],
      ["Group Favorite", 40, 1176225, 12840],
      ["Fake Relationship", 38, 13061286.84, 130613.1579],
      ["Friendship", 26, 751438.4615, 14600],
      ["Step-Siblings", 26, 1003173.077, 12219.23077],
      ["Surrogate Bride", 20, 24619705, 192395],
      ["Neighbors", 18, 438622.2222, 9555.555556],
      ["Blind Date", 14, 1224828.571, 10257.14286],
      ["Adventure", 10, 5418420, 79780],
      ["Multiple Identities", 10, 2379210, 31250],
      ["Fake Pregnancy", 9, 20956100, 389088.8889],
      ["Fated Lovers", 9, 2272922.222, 32100],
      ["Reverse Harem", 9, 11453333.33, 134733.3333],
      ["Harem", 8, 2356837.5, 32112.5],
      ["The Chosen One", 8, 1280625, 25737.5],
      ["Playing Dumb", 5, 1281180, 18720]
    ];

    var data = rawData.map(function (item) {
      return { label: item[0], count: item[1], views: item[2], saves: item[3] };
    });

    var svg = root.querySelector(".rm-chart");
    var tooltip = root.querySelector(".rm-tooltip");
    var activeCard = root.querySelector(".rm-active-card");
    var search = root.querySelector(".rm-search");
    var labelToggle = root.querySelector(".rm-label-toggle");
    var modeSelect = root.querySelector(".rm-mode");
    var ns = "http://www.w3.org/2000/svg";
    var W = 1060;
    var H = 620;
    var margin = { top: 24, right: 30, bottom: 58, left: 82 };
    var plot = {
      x: margin.left,
      y: margin.top,
      w: W - margin.left - margin.right,
      h: H - margin.top - margin.bottom
    };
    var xMin = 3e5;
    var xMax = 5e7;
    var yMin = 8e3;
    var yMax = 5e5;
    var xTicks = [3.16228e5, 1e6, 3.162278e6, 1e7, 3.1622777e7];
    var yTicks = [1e4, 3.1623e4, 1e5, 3.16228e5];
    var countMin = Math.min.apply(null, data.map(function (d) { return d.count; }));
    var countMax = Math.max.apply(null, data.map(function (d) { return d.count; }));
    var activeLabel = null;

    function log(value) { return Math.log(value) / Math.LN10; }
    function scaleLog(value, min, max, rangeMin, rangeMax) {
      var t = (log(value) - log(min)) / (log(max) - log(min));
      return rangeMin + t * (rangeMax - rangeMin);
    }
    function xScale(value) { return scaleLog(value, xMin, xMax, plot.x, plot.x + plot.w); }
    function yScale(value) { return scaleLog(value, yMin, yMax, plot.y + plot.h, plot.y); }
    function radiusScale(count) {
      return 4 + Math.sqrt((count - countMin) / (countMax - countMin)) * 20;
    }
    function fmt(value) { return Math.round(value).toLocaleString("en-US"); }
    function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    var palette = [
      [68, 65, 189],
      [125, 67, 199],
      [204, 93, 155],
      [243, 169, 92],
      [217, 222, 57]
    ];

    function colorFor(count) {
      var t = (count - countMin) / (countMax - countMin);
      var p = t * (palette.length - 1);
      var i = Math.floor(p);
      var f = p - i;
      var a = palette[i];
      var b = palette[Math.min(i + 1, palette.length - 1)];
      return "rgb(" + Math.round(lerp(a[0], b[0], f)) + "," + Math.round(lerp(a[1], b[1], f)) + "," + Math.round(lerp(a[2], b[2], f)) + ")";
    }

    function make(name, attrs, parent, text) {
      var node = document.createElementNS(ns, name);
      Object.keys(attrs || {}).forEach(function (key) {
        node.setAttribute(key, attrs[key]);
      });
      if (text) node.textContent = text;
      (parent || svg).appendChild(node);
      return node;
    }

    var gridLayer = make("g", {}, svg);
    var bubbleLayer = make("g", {}, svg);
    var labelLayer = make("g", {}, svg);
    var focusLayer = make("g", {}, svg);
    var focusX = make("line", { class: "rm-focus" }, focusLayer);
    var focusY = make("line", { class: "rm-focus" }, focusLayer);

    function drawBase() {
      make("rect", { class: "rm-plot-bg", x: plot.x, y: plot.y, width: plot.w, height: plot.h }, gridLayer);

      xTicks.forEach(function (tick) {
        var x = xScale(tick);
        make("line", { class: "rm-grid major", x1: x, y1: plot.y, x2: x, y2: plot.y + plot.h }, gridLayer);
        make("text", { class: "rm-tick", x: x, y: plot.y + plot.h + 22, "text-anchor": "middle" }, gridLayer, fmt(tick));
      });

      yTicks.forEach(function (tick) {
        var y = yScale(tick);
        make("line", { class: "rm-grid major", x1: plot.x, y1: y, x2: plot.x + plot.w, y2: y }, gridLayer);
        make("text", { class: "rm-tick", x: plot.x - 9, y: y + 4, "text-anchor": "end" }, gridLayer, fmt(tick));
      });

      for (var xp = 5; xp <= 7; xp += 1) {
        for (var xm = 2; xm < 10; xm += 1) {
          var xv = xm * Math.pow(10, xp);
          if (xv > xMin && xv < xMax) {
            var gx = xScale(xv);
            make("line", { class: "rm-grid", x1: gx, y1: plot.y, x2: gx, y2: plot.y + plot.h }, gridLayer);
          }
        }
      }

      for (var yp = 4; yp <= 5; yp += 1) {
        for (var ym = 2; ym < 10; ym += 1) {
          var yv = ym * Math.pow(10, yp);
          if (yv > yMin && yv < yMax) {
            var gy = yScale(yv);
            make("line", { class: "rm-grid", x1: plot.x, y1: gy, x2: plot.x + plot.w, y2: gy }, gridLayer);
          }
        }
      }

      make("text", { class: "rm-axis-title", x: plot.x + plot.w / 2, y: H - 14, "text-anchor": "middle" }, gridLayer, "\u5e73\u5747\u64ad\u653e\u91cf\uff08\u5bf9\u6570\u5c3a\u5ea6\uff09");
      make("text", {
        class: "rm-axis-title",
        x: 24,
        y: plot.y + plot.h / 2,
        "text-anchor": "middle",
        transform: "rotate(-90 24 " + (plot.y + plot.h / 2) + ")"
      }, gridLayer, "\u5e73\u5747\u6536\u85cf\u91cf\uff08\u5bf9\u6570\u5c3a\u5ea6\uff09");
    }

    function labelOffset(d, index) {
      var left = d.x > plot.x + plot.w * 0.78;
      var high = d.y < plot.y + 60;
      var low = d.y > plot.y + plot.h - 44;
      var stagger = (index % 5) - 2;
      return {
        dx: left ? -d.r - 6 : d.r + 5,
        dy: high ? 18 : low ? -8 : 4 + stagger * 1.6,
        anchor: left ? "end" : "start"
      };
    }

    function drawBubbles() {
      data.forEach(function (d, i) {
        d.x = xScale(d.views);
        d.y = yScale(d.saves);
        d.r = radiusScale(d.count);
        d.efficiency = d.saves / d.count;

        var bubble = make("circle", {
          class: "rm-bubble",
          cx: d.x,
          cy: d.y,
          r: d.r,
          fill: colorFor(d.count),
          "data-label": d.label
        }, bubbleLayer);
        make("title", {}, bubble, d.label + " | Views: " + fmt(d.views) + " | Saves: " + fmt(d.saves) + " | Count: " + fmt(d.count));

        var offset = labelOffset(d, i);
        var label = make("text", {
          class: "rm-label",
          x: d.x + offset.dx,
          y: d.y + offset.dy,
          "text-anchor": offset.anchor,
          "data-label": d.label
        }, labelLayer, d.label);

        d.bubble = bubble;
        d.labelNode = label;

        bubble.addEventListener("mouseenter", function (event) { setActive(d, event); });
        bubble.addEventListener("mousemove", function (event) { setActive(d, event); });
        bubble.addEventListener("pointerleave", clearActive);
        bubble.addEventListener("click", function (event) {
          event.stopPropagation();
          activeLabel = activeLabel === d.label ? null : d.label;
          setActive(d, event);
          applyFilters();
        });
      });
    }

    function matchMode(d) {
      var mode = modeSelect.value;
      if (mode === "popular") return d.views >= 1.2e7;
      if (mode === "saved") return d.saves >= 1.2e5;
      if (mode === "large") return d.count >= 180;
      if (mode === "niche") return d.count <= 40 && (d.views >= 1e7 || d.saves >= 1.2e5);
      return true;
    }

    function applyFilters() {
      var query = (search.value || "").toLowerCase();
      var showLabels = labelToggle.checked;

      data.forEach(function (d) {
        var matchesSearch = !query || d.label.toLowerCase().indexOf(query) >= 0;
        var visible = matchMode(d);
        var active = activeLabel ? d.label === activeLabel : matchesSearch && visible;
        var muted = !active || !visible;
        d.bubble.classList.toggle("is-muted", muted);
        d.bubble.classList.toggle("is-active", d.label === activeLabel || (query && matchesSearch && visible));
        d.labelNode.classList.toggle("is-muted", muted);
        d.labelNode.classList.toggle("is-hidden", !showLabels || !visible);
      });
    }

    function setActive(d) {
      data.forEach(function (item) {
        var isActive = item.label === d.label;
        item.bubble.classList.toggle("is-active", isActive);
        item.bubble.classList.toggle("is-muted", !isActive);
        item.labelNode.classList.toggle("is-muted", !isActive);
      });

      focusX.setAttribute("x1", d.x);
      focusX.setAttribute("x2", d.x);
      focusX.setAttribute("y1", plot.y);
      focusX.setAttribute("y2", plot.y + plot.h);
      focusY.setAttribute("x1", plot.x);
      focusY.setAttribute("x2", plot.x + plot.w);
      focusY.setAttribute("y1", d.y);
      focusY.setAttribute("y2", d.y);
      focusX.classList.add("is-visible");
      focusY.classList.add("is-visible");

      var chartRect = root.querySelector(".rm-chart-box").getBoundingClientRect();
      var svgRect = svg.getBoundingClientRect();
      var left = svgRect.left + (d.x / W) * svgRect.width - chartRect.left;
      var top = svgRect.top + (d.y / H) * svgRect.height - chartRect.top;
      tooltip.style.left = clamp(left, 120, chartRect.width - 120) + "px";
      tooltip.style.top = clamp(top, 110, chartRect.height - 10) + "px";
      tooltip.innerHTML =
        "<h3>" + d.label + "</h3>" +
        "<div class='rm-row'><span>\u5267\u76ee\u6570\u91cf</span><strong>" + fmt(d.count) + "</strong></div>" +
        "<div class='rm-row'><span>\u5e73\u5747\u64ad\u653e\u91cf</span><strong>" + fmt(d.views) + "</strong></div>" +
        "<div class='rm-row'><span>\u5e73\u5747\u6536\u85cf\u91cf</span><strong>" + fmt(d.saves) + "</strong></div>";
      tooltip.classList.add("is-visible");
      activeCard.innerHTML =
        "<strong>" + d.label + "</strong> &nbsp; " +
        "\u5267\u76ee\u6570\u91cf " + fmt(d.count) + " / " +
        "\u5e73\u5747\u64ad\u653e\u91cf " + fmt(d.views) + " / " +
        "\u5e73\u5747\u6536\u85cf\u91cf " + fmt(d.saves);
    }

    function clearActive() {
      if (activeLabel) return;
      tooltip.classList.remove("is-visible");
      focusX.classList.remove("is-visible");
      focusY.classList.remove("is-visible");
      activeCard.innerHTML = "\u70b9\u51fb\u6216\u60ac\u505c\u6c14\u6ce1\u67e5\u770b\u8be6\u60c5";
      applyFilters();
    }

    function datumFromTarget(target) {
      var node = target;
      while (node && node !== svg) {
        if (node.getAttribute && node.getAttribute("data-label")) {
          var label = node.getAttribute("data-label");
          for (var i = 0; i < data.length; i += 1) {
            if (data[i].label === label) return data[i];
          }
        }
        node = node.parentNode;
      }
      return null;
    }

    drawBase();
    drawBubbles();
    applyFilters();

    search.addEventListener("input", function () {
      activeLabel = null;
      applyFilters();
    });

    labelToggle.addEventListener("change", applyFilters);
    modeSelect.addEventListener("change", function () {
      activeLabel = null;
      applyFilters();
    });

    svg.addEventListener("mousemove", function (event) {
      var d = datumFromTarget(event.target);
      if (d) setActive(d, event);
    });

    svg.addEventListener("touchstart", function (event) {
      var d = datumFromTarget(event.target);
      if (d) {
        activeLabel = d.label;
        setActive(d, event);
        applyFilters();
      }
    }, { passive: true });

    svg.addEventListener("click", function (event) {
      var d = datumFromTarget(event.target);
      if (d) {
        activeLabel = activeLabel === d.label ? null : d.label;
        setActive(d, event);
        applyFilters();
        return;
      }
      if (event.target === svg || event.target.classList.contains("rm-plot-bg")) {
        activeLabel = null;
        tooltip.classList.remove("is-visible");
        focusX.classList.remove("is-visible");
        focusY.classList.remove("is-visible");
        activeCard.innerHTML = "\u70b9\u51fb\u6216\u60ac\u505c\u6c14\u6ce1\u67e5\u770b\u8be6\u60c5";
        applyFilters();
      }
    });
  });
})();
</script>

</body>
</html>
