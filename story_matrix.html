  <title>ReelShort Top 200 短剧故事马赛克</title>
  <style>
    :root {
      --background:#f2efec; --foreground:#161315; --muted:#777074;
      --panel:rgba(255,255,255,.88); --border:rgba(32,20,25,.11);
      --black:#0b090a; --pink:#ff165d; --red:#ef174b; --orange:#ff6a24;
      --brand-gradient:linear-gradient(135deg,var(--pink),var(--red) 55%,var(--orange));
      color-scheme:light;
    }
    *{box-sizing:border-box}
    html{min-width:320px;background:var(--background)}
    body{margin:0;color:var(--foreground);background:radial-gradient(circle at 85% 2%,rgba(255,22,93,.1),transparent 25rem),var(--background);font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif}
    button,input,select{font:inherit} button{-webkit-tap-highlight-color:transparent}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .page-shell{width:min(1180px,calc(100% - 24px));margin:0 auto;padding:12px 0 24px}
    .tool-panel{display:grid;grid-template-columns:minmax(260px,1fr) 200px auto;align-items:center;gap:8px;margin-bottom:10px;padding:8px;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.7);backdrop-filter:blur(14px)}
    .search-control{height:38px;display:flex;align-items:center;gap:10px;padding:0 11px;border:1px solid var(--border);border-radius:9px;background:#fff}
    .search-control input{width:100%;min-width:0;border:0;outline:0;color:var(--foreground);background:transparent;font-size:12px}
    .search-control input::placeholder{color:#aaa4a7}.search-control button{padding:0;border:0;color:#8f888b;background:transparent;font-size:20px;cursor:pointer}
    .search-symbol{width:13px;height:13px;position:relative;flex:none;border:1.5px solid #8d8589;border-radius:50%}
    .search-symbol:after{content:"";width:5px;height:1.5px;position:absolute;right:-4px;bottom:-2px;background:#8d8589;transform:rotate(45deg)}
    .select-control{height:38px;display:flex;align-items:center;gap:8px;padding:0 10px;border:1px solid var(--border);border-radius:9px;background:#fff}
    .select-control>span,.sort-control>span{color:#8d8589;font-size:9px;white-space:nowrap}
    .select-control select{width:100%;min-width:0;border:0;outline:0;color:#393436;background:transparent;font-size:11px;cursor:pointer}
    .sort-control{display:flex;align-items:center;gap:4px}.sort-control>span{margin:0 3px}
    .sort-control button{height:30px;padding:0 9px;border:1px solid var(--border);border-radius:8px;color:#6f696c;background:#fff;font-size:10px;cursor:pointer}
    .sort-control button:hover{color:var(--foreground);border-color:rgba(239,23,75,.32)}
    .sort-control button.is-active{color:#fff;border-color:transparent;background:var(--black)}
    .mosaic-card{position:relative;padding:12px;border:1px solid var(--border);border-radius:18px;background:var(--panel);box-shadow:0 18px 48px rgba(39,22,28,.08)}
    .case-summary{min-height:48px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px 15px;margin-bottom:10px;padding:10px 12px;border:1px solid rgba(239,23,75,.11);border-radius:12px;background:linear-gradient(100deg,rgba(255,22,93,.07),rgba(255,255,255,.74) 40%)}
    .summary-count{color:var(--red);font:750 10px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.08em;white-space:nowrap}
    .summary-title{min-width:160px;flex:1 1 340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
    .summary-meta{color:#898285;font-size:10px;white-space:nowrap}
    .mosaic-viewport{width:100%;overflow-x:auto;overflow-y:hidden;padding:2px 2px 7px;scrollbar-color:rgba(239,23,75,.28) transparent;scrollbar-width:thin}
    .drama-mosaic{display:grid;grid-template-columns:repeat(18,minmax(0,1fr));grid-template-rows:repeat(22,auto);gap:4px;width:100%;min-width:720px;isolation:isolate}
    .drama-tile{position:relative;min-width:0;min-height:27px;aspect-ratio:1.75;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 4px;border:1px solid rgba(100,4,31,.48);border-radius:5px;color:#fff;background:linear-gradient(90deg,transparent 0 10%,rgba(255,255,255,.18) 10% 12%,transparent 12%),repeating-linear-gradient(0deg,transparent 0 43%,rgba(255,255,255,.09) 43% 48%,transparent 48% 96%),hsl(344 84% var(--tile-lightness));box-shadow:inset 0 1px 0 rgba(255,255,255,.12);font:700 9px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.04em;cursor:pointer;transition:transform 120ms ease,filter 120ms ease,box-shadow 120ms ease}
    .drama-tile:hover,.drama-tile:focus-visible,.drama-tile[aria-pressed="true"]{z-index:3;outline:none;filter:brightness(1.13) saturate(1.08);transform:translateY(-2px) scale(1.04);box-shadow:0 5px 13px rgba(129,7,45,.25)}
    .drama-tile:focus-visible{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--pink),0 5px 13px rgba(129,7,45,.25)}
    .drama-tile[aria-pressed="true"]:after{content:"";width:5px;height:5px;position:absolute;right:3px;top:3px;border-radius:50%;background:#fff;box-shadow:0 0 7px #fff}
    .tile-play{width:0;height:0;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:5px solid rgba(255,255,255,.82)}
    .mosaic-legend{min-height:34px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px 16px;padding-top:10px;color:#8a8386;font-size:9px}
    .mosaic-legend span{display:flex;align-items:center;gap:6px}.mosaic-legend i{width:13px;height:7px;display:inline-block;border-radius:2px;background:var(--brand-gradient)}
    .mosaic-legend button{margin-left:auto;padding:0;border:0;color:var(--red);background:transparent;font-size:9px;cursor:pointer}
    .drama-popover{width:min(560px,calc(100% - 20px));max-height:min(560px,calc(100vh - 40px));position:absolute;z-index:30;overflow-y:auto;padding:18px;border:1px solid rgba(255,91,128,.32);border-radius:15px;color:#fff;background:radial-gradient(circle at 100% 0,rgba(255,31,90,.2),transparent 45%),rgba(12,9,11,.98);box-shadow:0 24px 60px rgba(27,7,14,.38);pointer-events:none}
    .drama-popover.is-pinned{border-color:rgba(255,112,147,.58)}.popover-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .popover-brand{display:flex;align-items:center;gap:8px}.popover-brand>span{color:#9d9397;font:700 9px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:.12em}
    .brand-mark{width:28px;height:28px;display:inline-grid;place-items:center;border-radius:7px;background:var(--brand-gradient)}
    .brand-mark span{color:#fff;font-size:18px;font-weight:1000;line-height:1;letter-spacing:-3px;transform:skew(-4deg);margin-left:-2px}
    .brand-mark span:after{content:"";display:inline-block;margin-left:-6px;border-top:3px solid transparent;border-bottom:3px solid transparent;border-left:5px solid #fff;transform:translateY(-2px)}
    .pin-state{padding:4px 7px;border:1px solid rgba(255,255,255,.13);border-radius:999px;color:#a99fa3;font-size:8px}.is-pinned .pin-state{color:#ff6d8e;border-color:rgba(255,71,114,.32);background:rgba(255,22,93,.09)}
    .drama-popover h2{margin:14px 0 9px;font-size:clamp(20px,3vw,31px);line-height:1.13;letter-spacing:-.04em}.popover-tags{display:flex;flex-wrap:wrap;gap:5px}
    .popover-tags span{padding:4px 6px;border:1px solid rgba(255,78,120,.28);border-radius:4px;color:#ff698c;background:rgba(255,22,93,.06);font:700 8px ui-monospace,SFMono-Regular,Consolas,monospace;text-transform:uppercase}
    .popover-metrics{display:grid;grid-template-columns:1fr 1fr;margin:16px 0;border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.1)}
    .popover-metrics>div{display:grid;grid-template-columns:15px 1fr;grid-template-rows:auto auto;align-items:center;column-gap:7px;padding:11px 0}.popover-metrics>div+div{padding-left:18px;border-left:1px solid rgba(255,255,255,.1)}
    .popover-metrics small{color:#8e8589;font-size:8px}.popover-metrics strong{font:700 14px ui-monospace,SFMono-Regular,Consolas,monospace}
    .play-icon{grid-row:1/3;width:0;height:0;justify-self:center;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:8px solid var(--pink)}
    .heart-icon{grid-row:1/3;color:var(--pink);font-size:15px}.story-block{padding-top:2px}.story-block>span{color:#ff668a;font-size:9px;letter-spacing:.08em}
    .story-block p{margin:7px 0 0;color:#d5cfd2;font-family:"Songti SC","STSong","SimSun",serif;font-size:13px;line-height:1.8}.popover-tip{margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);color:#716a6d;font-size:8px}
    @media(max-width:780px){.tool-panel{grid-template-columns:1fr 1fr}.search-control{grid-column:1/-1}.sort-control{justify-content:flex-end}.summary-meta{width:100%}.drama-mosaic{min-width:660px;gap:3px}}
    @media(max-width:520px){.page-shell{width:calc(100% - 12px);padding-top:6px}.tool-panel{grid-template-columns:1fr}.search-control{grid-column:auto}.select-control{justify-content:space-between}.select-control select{width:auto;max-width:70%}.sort-control{justify-content:space-between}.sort-control>span{margin-right:auto}.mosaic-card{padding:8px;border-radius:14px}.case-summary{align-items:flex-start;padding:9px}.summary-title{width:100%;flex-basis:100%;white-space:normal;line-height:1.4}.drama-mosaic{min-width:620px;gap:3px}.drama-tile{min-height:25px;font-size:8px}.tile-play{display:none}.mosaic-legend span:nth-child(2){display:none}.drama-popover{position:fixed;z-index:60;left:6px!important;right:6px;top:auto!important;bottom:6px;width:auto;max-height:72vh;padding:16px;border-radius:14px}.drama-popover h2{font-size:23px}.story-block p{font-size:12px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{transition-duration:.01ms!important}}
  </style>

  <script>

    }

    function restorePinnedOrHide() {
      if (pinnedRank != null && buttons.has(pinnedRank)) {
        show(pinnedRank, buttons.get(pinnedRank));
        return;
      }
      activeRank = null;
      popover.hidden = true;
      updateSummary(null);
    }

    function togglePinned(rank, button) {
      buttons.forEach(function(tile){ tile.setAttribute("aria-pressed", "false"); });
      if (pinnedRank === rank) {
        pinnedRank = null;
        restorePinnedOrHide();
        return;
      }
      pinnedRank = rank;
      button.setAttribute("aria-pressed", "true");
      show(rank, button);
    }

    function applyFilters() {
      const needle = search.value.trim().toLocaleLowerCase();
      filtered = dramas.filter(function(item) {
        const matchesTag = currentTag === ALL_TAGS || item.englishTags.includes(currentTag);
        const haystack = [item.title, item.englishTags.join(" "), item.synopsisZh].join(" ").toLocaleLowerCase();
        return matchesTag && (!needle || haystack.includes(needle));
      });
      filtered.sort(function(a,b) {
        if (currentSort === "plays") return b.plays - a.plays;
        if (currentSort === "favorites") return b.favorites - a.favorites;
        return a.rank - b.rank;
      });
      pinnedRank = null;
      activeRank = null;
      renderGrid();
      clearSearch.hidden = !search.value;
      clearFiltersButton.hidden = !search.value && currentTag === ALL_TAGS;
    }

    function renderGrid() {
      buttons.clear();
      grid.replaceChildren();
      const fragment = document.createDocumentFragment();
      filtered.forEach(function(item, index) {
        const button = document.createElement("button");
        const intensity = 36 + ((200 - item.rank) / 199) * 42;
        const positionIndex = filtered.length <= 1
          ? 0
          : Math.round((index * (rPositions.length - 1)) / (filtered.length - 1));
        const position = rPositions[positionIndex];
        button.type = "button";
        button.className = "drama-tile";
        button.style.setProperty("--tile-lightness", intensity + "%");
        button.style.gridColumn = String(position.column);
        button.style.gridRow = String(position.row);
        button.setAttribute("aria-pressed", "false");
        button.setAttribute("aria-label", "第 " + String(item.rank).padStart(3,"0") + " 部：" + item.title + "。悬停、聚焦或点击查看详情。");
        button.innerHTML = '<span class="tile-play" aria-hidden="true"></span><span>' + String(item.rank).padStart(3,"0") + '</span>';
        button.addEventListener("pointerenter", function(){ show(item.rank, button); });
        button.addEventListener("pointerleave", restorePinnedOrHide);
        button.addEventListener("focus", function(){ show(item.rank, button); });
        button.addEventListener("blur", restorePinnedOrHide);
        button.addEventListener("click", function(){ togglePinned(item.rank, button); });
        buttons.set(item.rank, button);
        fragment.appendChild(button);
      });
      grid.appendChild(fragment);
      grid.hidden = filtered.length === 0;
      grid.setAttribute("aria-label", filtered.length + " 部 ReelShort 短剧组成的 R 字母");
      popover.hidden = true;
      updateSummary(null);
    }

    const tags = Array.from(new Set(dramas.flatMap(function(item){ return item.englishTags; }))).filter(Boolean).sort();
    [ALL_TAGS].concat(tags).forEach(function(tag) {
      const option = document.createElement("option");
      option.value = tag;
      option.textContent = tag;
      tagFilter.appendChild(option);
    });

    search.addEventListener("input", applyFilters);
    clearSearch.addEventListener("click", function(){ search.value = ""; applyFilters(); search.focus(); });
    tagFilter.addEventListener("change", function(){ currentTag = tagFilter.value; applyFilters(); });
    document.querySelectorAll("[data-sort]").forEach(function(button) {
      button.addEventListener("click", function() {
        currentSort = button.dataset.sort;
        document.querySelectorAll("[data-sort]").forEach(function(item) {
          const active = item === button;
          item.classList.toggle("is-active", active);
          item.setAttribute("aria-pressed", String(active));
        });
        applyFilters();
      });
    });
    function clearAll() { search.value = ""; currentTag = ALL_TAGS; tagFilter.value = ALL_TAGS; applyFilters(); }
    clearFiltersButton.addEventListener("click", clearAll);
    document.addEventListener("keydown", function(event) {
      if (event.key !== "Escape") return;
      pinnedRank = null;
      buttons.forEach(function(tile){ tile.setAttribute("aria-pressed", "false"); });
      restorePinnedOrHide();
    });
    window.addEventListener("resize", function() {
      if (activeRank != null && buttons.has(activeRank) && !popover.hidden) positionPopover(buttons.get(activeRank));
    });
    renderGrid();
  </script>
</body>
</html>
